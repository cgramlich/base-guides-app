<!DOCTYPE html>
<!--
  BASE GUIDES - single-file mobile web app  (MilSpo Living)
  Stack: React 18 + Babel Standalone (CDN). No build step. Open or host the file.
  Architecture: the app ships with NO base content. Each base's guide is fetched
  ON DEMAND (data/bases/<slug>.json now; backend API later) and cached by the
  service worker. One app, all bases, light forever. (Anti-Touch-Stay design.)
  Live layer (AI Q&A + nearby places) is served by the backend via API_BASE.
  Notes: all console/log output is plain ASCII (no emoji) by design.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Base Guides" />
  <meta name="theme-color" content="#121621" />
  <link rel="icon" type="image/png" href="favicon-32.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <title>Base Guides</title>
  <meta property="og:title" content="Base Guides" />
  <meta property="og:description" content="Living guides to U.S. military bases - by MilSpo Living." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

  <style>
    :root{
      --bg:#121621; --bg-2:#161c29; --surface:#1c2433; --surface-2:#243041;
      --line:#334053; --line-soft:#2b3647;
      --text:#eef2f8; --text-dim:#aab6c8; --text-faint:#6f7c90;
      --accent:#e7b24c; --accent-dim:#c5923a;
      --ok:#7faa6b; --danger:#d9604e;
      --shadow:0 8px 28px rgba(0,0,0,0.45);
    }
    *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
    html,body{margin:0; padding:0; background:var(--bg); color:var(--text);}
    body{
      font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
      font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased;
      overscroll-behavior-y:none;
    }
    /* Editorial long-form reads in Crimson Pro; UI stays DM Sans; headlines Fraunces. */
    .acc-body, .acc-body p, .ask-ans, .md, .basehero .tag, .hero .tag{ font-family:'Crimson Pro',Georgia,serif; }
    .acc-body{ font-size:15.5px; line-height:1.6; }
    .home-hero{ text-align:center; padding:4px 0 20px; }
    .home-logo{ width:128px; height:128px; }
    .home-tag{ font-family:'Crimson Pro',Georgia,serif; color:var(--text-dim); font-size:15px; margin-top:4px; }
    input,textarea,select,button{font-family:inherit; font-size:16px;}
    button{cursor:pointer; border:none; background:none; color:inherit;}
    h1,h2,h3{font-family:'Fraunces',Georgia,serif; font-weight:600; margin:0; line-height:1.18;}

    #app-shell{
      max-width:540px; margin:0 auto; min-height:100vh; background:var(--bg);
      position:relative; padding-bottom:calc(72px + env(safe-area-inset-bottom));
    }
    .topbar{
      position:sticky; top:0; z-index:30; background:var(--bg);
      padding:calc(14px + env(safe-area-inset-top)) 20px 10px;
      border-bottom:1px solid var(--line-soft);
    }
    .topbar h1{font-size:26px; letter-spacing:-0.02em;}
    .topbar .sub{font-size:12px; color:var(--text-faint); margin-top:2px; letter-spacing:0.08em; text-transform:uppercase;}
    .brandrow{display:flex; align-items:center; gap:12px;}
    .brandmark{width:48px; height:48px; flex:none; border-radius:50%;}
    .content{padding:14px 18px 24px;}

    .banner{
      margin:10px 18px 0; padding:10px 13px; border-radius:11px; font-size:13.5px;
      display:flex; align-items:center; gap:10px; border:1px solid var(--line);
      background:rgba(231,178,76,0.12); color:#f0d79a; border-color:rgba(231,178,76,0.4);
    }
    .banner button{margin-left:auto; font-size:12.5px; color:var(--accent); font-weight:600;}

    .card{
      background:var(--surface); border:1px solid var(--line-soft);
      border-radius:15px; padding:15px; margin-bottom:12px;
    }
    .card.tap{transition:transform 0.08s ease; cursor:pointer;}
    .card.tap:active{transform:scale(0.985);}
    .base-name{font-family:'Fraunces',serif; font-size:19px; font-weight:600; letter-spacing:-0.01em;}
    .meta-line{font-size:12px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.05em; margin-top:3px;}
    .pill{display:inline-block; font-size:11px; padding:2px 9px; border-radius:999px; background:var(--surface-2); border:1px solid var(--line); color:var(--text-dim); margin-left:8px; vertical-align:middle;}
    .pill.ready{background:rgba(127,170,107,0.14); border-color:rgba(127,170,107,0.4); color:#a9c98f;}
    .pill.soon{background:rgba(231,178,76,0.12); border-color:rgba(231,178,76,0.35); color:#e0c486;}
    .pill.oconus{background:rgba(111,159,201,0.16); border-color:rgba(111,159,201,0.4); color:#9cc0e0;}

    .back{font-size:14px; color:var(--accent); font-weight:500; display:inline-flex; gap:6px; align-items:center; margin-bottom:6px; cursor:pointer;}
    .hero{margin:2px 0 4px;}
    .hero .tag{color:var(--text-dim); font-size:14px; margin-top:6px;}
    .basehero{background:linear-gradient(160deg,var(--bg-2),var(--surface)); border:1px solid var(--line-soft); border-top:3px solid var(--accent-dim); border-radius:15px; padding:16px; margin-top:6px;}
    .basehero h1{font-size:24px; letter-spacing:-0.01em;}
    .basehero .tag{color:var(--text-dim); font-size:14px; margin-top:7px;}
    .basehero-meta{margin-top:10px; font-size:11.5px; letter-spacing:0.06em; text-transform:uppercase; color:var(--text-faint);}
    .localtime{margin-top:8px; font-size:12.5px; color:var(--text-dim);}
    .sec-ic{color:var(--accent-dim); display:inline-flex; align-items:center; flex:none;}

    /* ---- ask box ---- */
    .ask{ background:var(--surface); border:1px solid var(--line-soft); border-radius:13px; padding:13px; margin-top:12px; }
    .ask-title{ font-family:'Fraunces',serif; font-size:16px; margin-bottom:9px; }
    .ask-row{ display:flex; gap:8px; }
    .ask-inputwrap{ position:relative; flex:1; min-width:0; display:flex; }
    .ask-row input{ flex:1; min-width:0; background:var(--bg-2); border:1px solid var(--line); border-radius:9px; color:var(--text); padding:9px 32px 9px 11px; }
    .ask-clear{ position:absolute; right:5px; top:50%; transform:translateY(-50%); background:transparent; border:0; color:var(--text-faint); font-size:20px; line-height:1; padding:0 5px; cursor:pointer; }
    .ask-clear:hover{ color:var(--text); }
    .ask-row > button{ flex:0 0 auto; background:var(--accent); color:#10131b; font-weight:600; border-radius:9px; padding:9px 16px; }
    .ask-row > button:disabled{ opacity:0.6; }
    .ask-thinking{ display:flex; align-items:center; gap:9px; }
    .spin-sm{ width:15px; height:15px; border-width:2px; }
    .ask-ans{ margin-top:10px; font-size:14px; color:var(--text); line-height:1.55; background:var(--bg-2); border:1px solid var(--line-soft); border-radius:9px; padding:11px; }
    .md > :first-child{ margin-top:0; } .md > :last-child{ margin-bottom:0; }
    .md p{ margin:0 0 9px; }
    .md-h{ font-family:'Fraunces',serif; font-size:15.5px; color:var(--text); margin:12px 0 6px; }
    .md-h3{ font-size:13.5px; font-weight:600; color:var(--text); margin:10px 0 5px; }
    .md-ul{ margin:6px 0 9px; padding-left:18px; } .md-ul li{ margin:3px 0; }
    .md-quote{ border-left:3px solid var(--accent-dim); background:rgba(231,178,76,0.07); padding:8px 11px; border-radius:0 8px 8px 0; margin:9px 0; color:var(--text-dim); }
    .md-hr{ border:none; border-top:1px solid var(--line-soft); margin:11px 0; }
    .md a{ color:var(--accent); }

    .acc{border:1px solid var(--line-soft); border-radius:13px; margin-bottom:11px; overflow:hidden; background:var(--surface);}
    .acc-head{display:flex; align-items:center; gap:10px; padding:14px 15px; cursor:pointer;}
    .acc-head h3{font-size:16px; flex:1;}
    .acc-chev{color:var(--text-faint); display:inline-flex; align-items:center; transition:transform 0.18s ease;}
    .card-go{color:var(--text-faint); flex:none; display:flex; align-items:center; margin-left:10px;}
    .between{display:flex; align-items:center; justify-content:space-between; gap:10px;}
    .row{display:flex; align-items:center; gap:10px;}
    .muted{color:var(--text-dim);}
    .faint{color:var(--text-faint);}
    .tiny{font-size:12px;}
    .small{font-size:13.5px;}
    .acc.open .acc-chev{transform:rotate(180deg);}
    .acc-body{padding:0 15px 15px; font-size:14.5px; color:var(--text-dim);}
    .acc-body p{margin:0 0 10px;}

    dl.facts{margin:0; display:grid; grid-template-columns:auto 1fr; gap:7px 14px;}
    dl.facts dt{color:var(--text-faint); font-size:13px;}
    dl.facts dd{margin:0; color:var(--text); font-size:14px;}

    table.dec{width:100%; border-collapse:collapse; font-size:13px; margin-top:6px;}
    table.dec th, table.dec td{text-align:left; padding:7px 8px; border-bottom:1px solid var(--line-soft); vertical-align:top;}
    table.dec th{color:var(--text-faint); font-weight:500; font-size:11.5px; text-transform:uppercase; letter-spacing:0.04em;}
    table.dec td:first-child{color:var(--text);}

    .lst{list-style:none; margin:0; padding:0;}
    .lst li{padding:9px 0; border-top:1px solid var(--line-soft);}
    .lst li:first-child{border-top:none;}
    .lst .t{color:var(--text); font-weight:500; font-size:14px;}
    .lst .t .faint{font-weight:400;}
    .lst .d{color:var(--text-dim); font-size:13px; margin-top:2px;}

    .pending{font-size:13.5px; color:var(--text-faint); font-style:italic;}
    .place-detail{margin:8px 0 4px; padding:11px; background:var(--bg-2); border:1px solid var(--line-soft); border-radius:10px;}
    .place-photo{width:100%; height:150px; object-fit:cover; border-radius:8px; display:block; margin-bottom:9px;}
    .place-summary{font-family:'Crimson Pro',Georgia,serif; font-size:14px; color:var(--text-dim); margin-bottom:9px; line-height:1.5;}
    .place-hours{font-size:12px; color:var(--text-faint); margin-bottom:9px;}
    .place-hours div{line-height:1.55;}
    .place-links{display:flex; flex-wrap:wrap; gap:16px;}
    .place-links a{color:var(--accent); font-size:13px; font-weight:600;}
    .live-note{border:1px dashed var(--accent-dim); border-radius:11px; padding:11px 13px; font-size:13px; color:#e0c486; background:rgba(231,178,76,0.06);}
    .srcline{margin-top:12px; padding-top:9px; border-top:1px solid var(--line-soft); font-size:11.5px; color:var(--text-faint);}
    .srcline a{color:var(--accent-dim);}
    .screen-h{font-family:'Fraunces',serif; font-size:22px; margin:2px 2px 14px;}
    .fld{width:100%; background:var(--bg-2); border:1px solid var(--line); border-radius:9px; color:var(--text); padding:10px 11px; font-size:15px;}
    .fld-l{display:block; font-size:11.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:5px;}
    .card-actions{display:flex; align-items:center; gap:2px; flex:none;}
    .iconbtn{color:var(--text-faint); padding:6px; display:flex; align-items:center; border-radius:8px;}
    .task{display:flex; align-items:flex-start; gap:10px; padding:7px 0; font-size:14.5px; color:var(--text-dim); cursor:pointer;}
    .task input{margin-top:3px; width:17px; height:17px; accent-color:var(--accent); flex:none;}
    .task-done{text-decoration:line-through; color:var(--text-faint);}
    .btn-quiet{font-size:12.5px; color:var(--accent); display:inline-flex; align-items:center; gap:5px; font-weight:600;}
    .btn-gold{display:inline-block; background:var(--accent); color:#10131b; font-weight:600; padding:10px 16px; border-radius:10px; text-decoration:none; margin-top:10px;}
    .bridge{background:linear-gradient(160deg,rgba(231,178,76,0.13),var(--surface)); border:1px solid rgba(231,178,76,0.4); border-radius:14px; padding:15px; margin-bottom:14px;}
    .bridge-h{font-family:'Fraunces',serif; font-size:17px; margin-bottom:7px;}
    .bridge p{font-family:'Crimson Pro',Georgia,serif; color:var(--text-dim); font-size:15px; margin:0; line-height:1.55;}
    .wx{display:flex; align-items:center; gap:9px; margin:12px 0 2px;}
    .wx-temp{font-family:'Fraunces',serif; font-size:19px; color:var(--text);}
    .wx-cond{font-size:13.5px; color:var(--text-dim);}
    .wx-src{margin-left:auto; font-size:10.5px; letter-spacing:0.05em; color:var(--text-faint);}
    .wx-alert{margin:12px 0 0; padding:10px 12px; border-radius:10px; background:rgba(217,96,78,0.14); border:1px solid rgba(217,96,78,0.45); color:#eab0a6; font-size:13px;}
    .wx-alert-h{margin-top:3px; color:#e0b9b1; font-size:12.5px;}
    .bah-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;}
    .bah-sel{flex:0 0 88px; width:88px;}
    .seg{display:flex; border:1px solid var(--line); border-radius:9px; overflow:hidden; flex:1; min-width:200px;}
    .seg button{flex:1; padding:9px 6px; font-size:12.5px; color:var(--text-dim); background:var(--bg-2);}
    .seg button.on{background:var(--accent); color:#10131b; font-weight:600;}
    .bah-out{display:flex; align-items:baseline; gap:8px; margin:6px 0 8px;}
    .bah-amt{font-family:'Fraunces',serif; font-size:34px; color:var(--text); line-height:1;}
    .bah-mo{color:var(--text-faint); font-size:13px;}
    .bah-help{margin-top:8px; font-size:12px; line-height:1.5; color:var(--text-faint);}
    .picks-title{font-family:'Fraunces',serif; font-size:15px; color:var(--text); margin:2px 0 9px;}
    .picks{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px;}
    .pick-card{padding:10px 12px; background:var(--bg-2); border:1px solid var(--line-soft); border-left:3px solid var(--accent); border-radius:10px;}
    .pick-top{display:flex; align-items:baseline; justify-content:space-between; gap:10px;}
    .pick-name{font-weight:700; font-size:14px; color:var(--text);}
    .pick-cat{font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.04em; white-space:nowrap;}
    .pick-blurb{font-family:'Crimson Pro',Georgia,serif; font-size:14px; color:var(--text-dim); margin-top:3px; line-height:1.45;}
    .pick-link{display:inline-block; margin-top:6px; color:var(--accent); font-size:12.5px; font-weight:600;}
    .picks-divider{font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-faint); margin:14px 0 10px; border-top:1px solid var(--line-soft); padding-top:10px;}
    .chips{display:flex; flex-wrap:wrap; gap:7px;}
    .chip{background:var(--surface-2); border:1px solid var(--line); color:var(--text-dim); font-size:12.5px; padding:5px 11px; border-radius:999px;}
    .chip.pick{cursor:pointer;}
    .chip-on{background:var(--accent); color:#10131b; border-color:var(--accent); font-weight:600;}
    .re-grid{display:flex; gap:10px;}
    .re-cell{flex:1; background:var(--bg-2); border:1px solid var(--line-soft); border-radius:11px; padding:12px;}
    .re-num{font-family:'Fraunces',serif; font-size:22px; color:var(--text); line-height:1.1;}
    .re-lab{font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:0.04em; margin-top:3px;}
    .leaflet-wrap{height:58vh; border-radius:13px; overflow:hidden; border:1px solid var(--line-soft);}
    .leaflet-wrap .leaflet-popup-content{font-family:'DM Sans',sans-serif; font-size:13px;}

    .nav{
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:540px; display:flex; background:var(--bg-2);
      border-top:1px solid var(--line); z-index:40;
      padding-bottom:env(safe-area-inset-bottom);
    }
    .nav button{flex:1; padding:11px 0 9px; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--text-faint); font-size:11px; letter-spacing:0.03em;}
    .nav button.on{color:var(--accent);}
    .nav .ic{display:flex; align-items:center; justify-content:center; height:21px;}

    .center{display:flex; flex-direction:column; align-items:center; justify-content:center; padding:50px 20px; text-align:center; color:var(--text-faint);}
    .spin{width:22px;height:22px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 0.8s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function (e) {
          console.log("[bg] sw register failed:", e && e.message);
        });
      });
    }
  </script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useRef } = React;

    /* ---------------- CONFIG (single source of brand/version) ----------------
       Renaming the app is a one-line change here. Bundle ID lives in the native
       config and is independent of this display name. */
    const APP_NAME = "Base Guides";
    const BRAND = "MilSpo Living";
    // Brand artwork behind named files so a rebrand is a drop-in swap (see CLAUDE.md
    // "Rebranding"): replace these + the icon-*/apple-touch/favicon PNGs + CSS :root.
    const ASSETS = { logoMark: "logo-mark.png" };
    const CONTACT_EMAIL = "support@milspoliving.com"; // realtor-intro inbox (Porkbun forwarding)
    const APP_VERSION = "0.14.1";
    // Deployed backend (Railway). Content + live layer both come from here.
    // Empty string would fall back to local static data/ files for content.
    const API_BASE_DEFAULT = "https://web-production-43053.up.railway.app";
    const USING_API = !!API_BASE_DEFAULT;
    const DATA_BASE = USING_API ? API_BASE_DEFAULT.replace(/\/$/, "") + "/api/bases" : "data/bases";
    // Backend for the LIVE layer (AI Q&A + nearby places).
    const API_BASE = API_BASE_DEFAULT || "http://localhost:8000";

    function indexUrl() { return USING_API ? DATA_BASE : DATA_BASE + "/index.json"; }
    function baseUrl(slug) { return USING_API ? DATA_BASE + "/" + slug : DATA_BASE + "/" + slug + ".json"; }
    function apiUrl(path) { return API_BASE.replace(/\/$/, "") + path; }

    async function fetchJSON(url) {
      const r = await fetch(url, { cache: "no-cache" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }
    async function postJSON(url, body) {
      const r = await fetch(url, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }

    // Local user state (no account yet; Beehiiv identity comes later).
    const LS = {
      get(k, d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch (e) { return d; } },
      set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { /* ignore */ } },
    };

    // Inline SVG icons (replace placeholder text glyphs - crisp at any size).
    function Icon({ name, size = 20 }) {
      const p = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" };
      switch (name) {
        case "home": return <svg {...p}><path d="M3 10.5 12 3l9 7.5" /><path d="M5 9.5V21h14V9.5" /></svg>;
        case "guide": return <svg {...p}><path d="M4 4.5A1.5 1.5 0 0 1 5.5 3H19v18H5.5A1.5 1.5 0 0 1 4 19.5z" /><path d="M9 3v18" /></svg>;
        case "map": return <svg {...p}><path d="M12 21s-6.5-5.7-6.5-10.5a6.5 6.5 0 0 1 13 0C18.5 15.3 12 21 12 21z" /><circle cx="12" cy="10.5" r="2.3" /></svg>;
        case "search": return <svg {...p}><circle cx="11" cy="11" r="7" /><path d="m20 20-3.6-3.6" /></svg>;
        case "chevron": return <svg {...p}><path d="m6 9 6 6 6-6" /></svg>;
        case "cardchev": return <svg {...p}><path d="m9 6 6 6-6 6" /></svg>;
        case "back": return <svg {...p}><path d="m15 6-6 6 6 6" /></svg>;
        case "info": return <svg {...p}><circle cx="12" cy="12" r="9" /><path d="M12 11v5" /><path d="M12 8h.01" /></svg>;
        case "flag": return <svg {...p}><path d="M5 21V4" /><path d="M5 4h12l-2 4 2 4H5" /></svg>;

    // Per-branch accent color (scannable list + base-page header).
    const BRANCH_COLORS = { army: "#7d8b4e", "air force": "#4a90c2", navy: "#3f7cb0", marines: "#b23a3a", "coast guard": "#e07b39", "space force": "#8d9bb0", joint: "#9b7bc0" };
    function branchColor(b) {
      if (!b) return "var(--accent-dim)";
      const s = b.toLowerCase();
      if (s.indexOf("/") !== -1) return BRANCH_COLORS.joint;
      for (const k of Object.keys(BRANCH_COLORS)) if (s.indexOf(k) !== -1) return BRANCH_COLORS[k];
      return "var(--accent-dim)";
    }
    const SECTION_ICONS = { quick_facts: "info", mission: "flag", two_state_decision: "compass", gates: "shield", housing: "home", bah: "dollar", housing_costs: "dollar", schools: "cap", schools_live: "cap", healthcare: "health", shopping: "cart", nearby: "map" };
    function sectionIcon(id) { return SECTION_ICONS[id] || "info"; }

    /* ---------------- PWA self-update (ported from MenuCaptain) ---------------- */
    function useUpdateCheck() {
      const [newer, setNewer] = useState(null);
      useEffect(() => {
        (async () => {
          try {
            const u = location.pathname + "?vcheck=" + Date.now();
            const r = await fetch(u, { cache: "no-store" });
            const txt = await r.text();
            const m = txt.match(/APP_VERSION\s*=\s*"([0-9.]+)"/);
            if (m && m[1] && m[1] !== APP_VERSION) setNewer(m[1]);
          } catch (e) { /* offline - ignore */ }
        })();
      }, []);
      return newer;
    }
    function UpdateBanner() {
      const newer = useUpdateCheck();
      if (!newer) return null;
      const reload = () => {
        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage("clearCache");
        }
        setTimeout(() => location.reload(), 150);
      };
      return (
        <div className="banner">
          <span>Update available (v{newer}).</span>
          <button onClick={reload}>Refresh</button>
        </div>
      );
    }

    function LivePlaces({ coords, note, picks }) {
      const [items, setItems] = useState(null);

      const [geoBusy, setGeoBusy] = useState(false);

      const active = device || coords;

      useEffect(() => {

        let live = true; setItems(null); setErr(null);
        const u = apiUrl("/api/places/nearby?lat=" + alat + "&lng=" + alng + "&type=" + cat + "&radius=5000");

          .then((d) => { if (live) setItems(d.results || []); })

    // Tiny markdown renderer (AI answers come back as markdown). Builds React
    // nodes (no dangerouslySetInnerHTML). Handles bold, links, headings, lists,
    // blockquotes, and horizontal rules - enough for the assistant's output.
    function mdInline(text, kp) {
      const nodes = []; let rest = String(text); let k = 0;
      const re = /(\*\*([^*]+)\*\*)|(\[([^\]]+)\]\((https?:[^)]+)\))/;
      while (rest.length) {
        const m = rest.match(re);
        if (!m) { nodes.push(rest); break; }
        if (m.index > 0) nodes.push(rest.slice(0, m.index));
        if (m[1]) nodes.push(<strong key={kp + "b" + (k++)}>{m[2]}</strong>);
        else nodes.push(<a key={kp + "l" + (k++)} href={m[5]} target="_blank" rel="noopener noreferrer">{m[4]}</a>);
        rest = rest.slice(m.index + m[0].length);
      }
      return nodes;
    }
    function Markdown({ text }) {
      const lines = String(text).replace(/\r/g, "").split("\n");
      const blocks = []; let para = [], list = [];
      const flushP = () => { if (para.length) { blocks.push({ t: "p", x: para.join(" ") }); para = []; } };
      const flushL = () => { if (list.length) { blocks.push({ t: "ul", items: list.slice() }); list = []; } };
      for (const ln of lines) {
        const s = ln.trim();
        if (!s) { flushP(); flushL(); continue; }
        if (/^###\s+/.test(s)) { flushP(); flushL(); blocks.push({ t: "h3", x: s.replace(/^###\s+/, "") }); }
        else if (/^#{1,2}\s+/.test(s)) { flushP(); flushL(); blocks.push({ t: "h2", x: s.replace(/^#{1,2}\s+/, "") }); }
        else if (/^[-*]\s+/.test(s)) { flushP(); list.push(s.replace(/^[-*]\s+/, "")); }
        else if (/^>\s?/.test(s)) { flushP(); flushL(); blocks.push({ t: "q", x: s.replace(/^>\s?/, "") }); }
        else if (/^---+$/.test(s)) { flushP(); flushL(); blocks.push({ t: "hr" }); }
        else { flushL(); para.push(s); }
      }
      flushP(); flushL();
      return (
        <div className="md">
          {blocks.map((b, i) => {
            if (b.t === "h2") return <h3 key={i} className="md-h">{mdInline(b.x, "h" + i)}</h3>;
            if (b.t === "h3") return <div key={i} className="md-h3">{mdInline(b.x, "h" + i)}</div>;
            if (b.t === "ul") return <ul key={i} className="md-ul">{b.items.map((it, j) => <li key={j}>{mdInline(it, "li" + i + "_" + j)}</li>)}</ul>;
            if (b.t === "q") return <div key={i} className="md-quote">{mdInline(b.x, "q" + i)}</div>;
            if (b.t === "hr") return <hr key={i} className="md-hr" />;
            return <p key={i}>{mdInline(b.x, "p" + i)}</p>;
          })}
        </div>
      );
    }

    // "Ask about this base" - grounded AI Q&A via the backend.
    function AskBox({ slug }) {
      const [q, setQ] = useState("");
      const [a, setA] = useState(null);
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState(false);
      const inputRef = useRef(null);
      const ask = async () => {
        const question = q.trim();
        if (!question) return;
        setLoading(true); setA(null); setErr(false);
        try {
          const d = await postJSON(apiUrl("/api/ai/relay"), { slug, question });
          setA(d.answer || "(no answer)");
        } catch (e) { setErr(true); }
        setLoading(false);
      };
      const clear = () => {
        setQ(""); setA(null); setErr(false);
        if (inputRef.current) inputRef.current.focus();
      };
      return (
        <div className="ask">
          <div className="ask-title">Ask about this base</div>
          <div className="ask-row">
            <div className="ask-inputwrap">
              <input ref={inputRef} value={q} onChange={(e) => setQ(e.target.value)}
                placeholder="e.g. Where should we live?"
                onKeyDown={(e) => { if (e.key === "Enter") ask(); }} />
              {q ? <button className="ask-clear" onClick={clear} aria-label="Clear question" title="Clear">&times;</button> : null}
            </div>
            <button onClick={ask} disabled={loading}>{loading ? "..." : "Ask"}</button>
          </div>
          {loading ? <div className="ask-ans faint ask-thinking"><span className="spin spin-sm" />Thinking&hellip;</div> : null}
          {err ? <div className="ask-ans faint">Couldn't reach the assistant. Start the backend and try again.</div> : null}
          {a ? <div className="ask-ans"><Markdown text={a} /></div> : null}
          <div className="faint tiny" style={{ marginTop: 6 }}>Answers come only from this guide's verified content.</div>
        </div>
      );
    }

    /* ---------------- Screens ---------------- */
    function Home({ bases, loading, onOpen, saved, onToggleSave }) {
      if (loading) return <div className="center"><div className="spin" /></div>;
      if (!bases || !bases.length) return <div className="center">No bases yet.</div>;
      return (
        <div className="content">
          <div className="home-hero">
            <img className="home-logo" src={ASSETS.logoMark} alt="MilSpo Living" />
            <div className="home-tag">Guides for your next duty station.</div>
          </div>
          {bases.map((b) => (
            <div key={b.slug} className={"card" + (b.ready ? " tap" : "")} onClick={() => b.ready && onOpen(b.slug)} style={{ borderLeft: "4px solid " + branchColor(b.branch) }}>
              <div className="between">
                <div style={{ minWidth: 0 }}>
                  <div className="base-name">
                    {b.name}
                    {b.region === "OCONUS" ? <span className="pill oconus">OCONUS</span> : null}
                    {b.ready ? <span className="pill ready">Guide ready</span> : <span className="pill soon">Coming soon</span>}
                  </div>
                  <div className="meta-line">{[b.branch, b.state].filter(Boolean).join("  -  ")}</div>
                </div>
                <div className="card-actions">
                  <button className="iconbtn" style={saved.includes(b.slug) ? { color: "var(--accent)" } : null} onClick={(e) => { e.stopPropagation(); onToggleSave(b.slug); }} aria-label="Save">
                    <Icon name={saved.includes(b.slug) ? "bookmarkOn" : "bookmark"} size={18} />
                  </button>
                  {b.ready ? <span className="card-go"><Icon name="cardchev" size={20} /></span> : null}
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // Local time at the base (ticks). tz is an IANA zone on the base record.
    function LocalTime({ tz }) {
      const [, tick] = useState(0);
      useEffect(() => { const id = setInterval(() => tick((n) => n + 1), 30000); return () => clearInterval(id); }, []);
      if (!tz) return null;
      let s;
      try { s = new Intl.DateTimeFormat([], { timeZone: tz, weekday: "short", hour: "numeric", minute: "2-digit" }).format(new Date()); }
      catch (e) { return null; }
      return <div className="localtime">{s} local time</div>;
    }

    function BaseDetail({ slug, onBack, saved, onToggleSave }) {
      const [data, setData] = useState(null);
      const [err, setErr] = useState(null);
      const [openId, setOpenId] = useState(null);
      useEffect(() => {
        let live = true;
        setData(null); setErr(null);
        fetchJSON(baseUrl(slug)) // per-base fetch ON DEMAND - the architecture in action
          .then((d) => { if (live) { setData(d); setOpenId(d.sections && d.sections[0] ? d.sections[0].id : null); } })
          .catch((e) => { if (live) setErr(e.message); });
        return () => { live = false; };
      }, [slug]);

      if (err) return <div className="content"><span className="back" onClick={onBack}><Icon name="back" size={15} /> All bases</span><div className="center">Could not load this guide.<br />{err}</div></div>;
      if (!data) return <div className="content"><span className="back" onClick={onBack}><Icon name="back" size={15} /> All bases</span><div className="center"><div className="spin" /></div></div>;

      return (
        <div className="content">
          <span className="back" onClick={onBack}><Icon name="back" size={15} /> All bases</span>
          <div className="basehero" style={{ borderTopColor: branchColor(data.branch) }}>
            <div className="between">
              <h1>{data.name}</h1>
              <button className="iconbtn" style={saved.includes(slug) ? { color: "var(--accent)" } : null} onClick={() => onToggleSave(slug)} aria-label="Save">
                <Icon name={saved.includes(slug) ? "bookmarkOn" : "bookmark"} size={20} />
              </button>
            </div>
            {data.tagline ? <div className="tag">{data.tagline}</div> : null}
            <div className="basehero-meta">{[data.branch, (data.states || []).join(" / ")].filter(Boolean).join("  ·  ")}</div>
            <LocalTime tz={data.tz} />
          </div>
          <LiveWeather coords={data.coords} />
          <AskBox slug={slug} />
          <div style={{ marginTop: 12 }}>
            {(data.sections || []).map((s) => (
              <Accordion key={s.id} s={s} coords={data.coords}
                open={openId === s.id}
                onToggle={() => setOpenId(openId === s.id ? null : s.id)} />
            ))}
          </div>
        </div>
      );
    }

    function Stub({ label, note }) {
      return <div className="content"><div className="center"><strong style={{ color: "var(--text-dim)" }}>{label}</strong><br />{note}</div></div>;
    }

    // ---- PCS timeline (general guidance; user confirms specifics with orders/TMO) ----
    const PCS_BUCKETS = [
      { key: "d90", label: "90+ days out", offset: -90, tasks: ["Read the installation guide; shortlist neighborhoods", "Decide on-base (join the waitlist) vs off-base", "If buying: get pre-approved; connect with a base-area lender/realtor"] },
      { key: "d60", label: "~60 days out", offset: -60, tasks: ["Schedule your household goods (HHG) move with the transportation office", "Start medical/dental records transfer (note EFMP if it applies)", "Research schools and request enrollment requirements"] },
      { key: "d30", label: "~30 days out", offset: -30, tasks: ["Confirm move dates; arrange temporary lodging (TLE/TLA)", "Give notice to your landlord or list your home; schedule utilities", "Update DEERS; gather in-processing paperwork"] },
      { key: "d14", label: "~2 weeks out", offset: -14, tasks: ["Confirm pack-out dates with the movers", "Finalize travel (route/flights, pets, lodging en route)", "Change bank/address; set aside documents to hand-carry"] },
      { key: "week", label: "Move week", offset: -3, tasks: ["Supervise pack-out; photograph and keep your own inventory", "Final walkthrough; cancel local utilities", "Hand-carry: orders, IDs, medical records, valuables"] },
      { key: "arr", label: "Arrival", offset: 0, tasks: ["In-process at the installation; report to your unit", "Pick up keys / begin off-base move-in", "Set up utilities, internet, and vehicle registration"] },
      { key: "post", label: "First 30 days", offset: 14, tasks: ["Enroll kids in school; transfer TRICARE/medical", "Register vehicles per the state; update license & insurance", "Locate essentials: commissary, MTF, childcare, MWR"] },
    ];
    const PCS_MILESTONES = [
      { label: "Schedule HHG move", offsetDays: -60 }, { label: "Confirm dates & lodging", offsetDays: -30 },
      { label: "Pack-out week", offsetDays: -5 }, { label: "Move day", offsetDays: 0 },
      { label: "In-process at new base", offsetDays: 1 }, { label: "School & vehicle registration", offsetDays: 14 },
    ];
    function fmtDate(d) { return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" }); }
    function addDays(base, n) { const d = new Date(base); d.setDate(d.getDate() + n); return d; }
    function daysUntil(d) { return Math.ceil((d - new Date()) / 86400000); }
    function icsPad(n) { return String(n).padStart(2, "0"); }
    function icsDate(d) { return d.getFullYear() + icsPad(d.getMonth() + 1) + icsPad(d.getDate()); }
    function buildICS(moveDate, baseName) {
      const L = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//MilSpo Living//Base Guides//EN", "CALSCALE:GREGORIAN"];
      PCS_MILESTONES.forEach((m, i) => {
        const d = addDays(moveDate, m.offsetDays);
        L.push("BEGIN:VEVENT", "UID:milspo-" + i + "-" + icsDate(d) + "@milspoliving",
          "DTSTART;VALUE=DATE:" + icsDate(d), "DTEND;VALUE=DATE:" + icsDate(addDays(d, 1)),
          "SUMMARY:PCS - " + m.label, "DESCRIPTION:" + (baseName ? "PCS to " + baseName : "PCS milestone") + " (MilSpo Living)", "END:VEVENT");
      });
      L.push("END:VCALENDAR"); return L.join("\r\n");
    }
    function downloadFile(text, filename, mime) {
      const b = new Blob([text], { type: mime }); const u = URL.createObjectURL(b);
      const a = document.createElement("a"); a.href = u; a.download = filename;
      document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(u);
    }

    function PlanScreen({ bases, onOpen }) {
      const [pcs, setPcs] = useState(() => LS.get("bg_pcs", { moveDate: "", base: "" }));
      const [done, setDone] = useState(() => LS.get("bg_pcs_done", {}));
      const save = (next) => { setPcs(next); LS.set("bg_pcs", next); };
      const toggleDone = (id) => setDone((p) => { const n = { ...p, [id]: !p[id] }; LS.set("bg_pcs_done", n); return n; });
      const move = pcs.moveDate ? new Date(pcs.moveDate + "T00:00:00") : null;
      const baseObj = bases ? bases.find((b) => b.slug === pcs.base) : null;
      const until = move ? daysUntil(move) : null;
      return (
        <div className="content">
          <h2 className="screen-h">Your PCS plan</h2>
          <div className="card">
            <label className="fld-l">Move date</label>
            <input className="fld" type="date" value={pcs.moveDate} onChange={(e) => save({ ...pcs, moveDate: e.target.value })} />
            <label className="fld-l" style={{ marginTop: 12 }}>Moving to</label>
            <select className="fld" value={pcs.base} onChange={(e) => save({ ...pcs, base: e.target.value })}>
              <option value="">Select a base</option>
              {(bases || []).map((b) => <option key={b.slug} value={b.slug}>{b.name}</option>)}
            </select>
          </div>
          {!move ? <div className="pending" style={{ padding: "6px 2px" }}>Enter your move date to build a timeline.</div> : (
            <div>
              <div className="muted small" style={{ margin: "4px 2px 12px" }}>{until >= 0 ? until + " days until your move (" + fmtDate(move) + ")" : "Move date was " + fmtDate(move)}</div>
              {baseObj && until != null && until >= 0 && until <= 90 ? (
                <div className="bridge">
                  <div className="bridge-h">Talk to a vetted realtor at {baseObj.name}</div>
                  <p>You're about {until} days out - a good time to connect with a {baseObj.name}-area realtor who knows the neighborhoods, schools, and the buy-vs-rent math. No pressure, no spam.</p>
                  <a className="btn-gold" href={"mailto:" + CONTACT_EMAIL + "?subject=" + encodeURIComponent("Realtor intro for " + baseObj.name) + "&body=" + encodeURIComponent("I'm PCSing to " + baseObj.name + " around " + fmtDate(move) + " and would like an introduction to a vetted realtor.")}>Request an introduction</a>
                </div>
              ) : null}
              <div className="between" style={{ margin: "4px 2px 10px" }}>
                <h3 style={{ fontSize: 16 }}>Timeline</h3>
                <button className="btn-quiet" onClick={() => downloadFile(buildICS(move, baseObj ? baseObj.name : ""), "pcs-timeline.ics", "text/calendar")}><Icon name="download" size={15} /> Add to calendar</button>
              </div>
              {PCS_BUCKETS.map((bk) => {
                const d = addDays(move, bk.offset);
                return (
                  <div className="acc open" key={bk.key} style={{ marginBottom: 10 }}>
                    <div className="acc-head" style={{ cursor: "default" }}>
                      <span className="sec-ic"><Icon name="calendar" size={16} /></span>
                      <h3 style={{ fontSize: 15, flex: 1 }}>{bk.label}</h3>
                      <span className="muted tiny">{fmtDate(d)}</span>
                    </div>
                    <div className="acc-body">
                      {bk.tasks.map((t, i) => {
                        const id = bk.key + "-" + i;
                        return (
                          <label key={i} className="task">
                            <input type="checkbox" checked={!!done[id]} onChange={() => toggleDone(id)} />
                            <span className={done[id] ? "task-done" : ""}>{t}</span>
                          </label>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
              <div className="srcline">General PCS guidance - confirm specifics with your orders, the transportation office (TMO), and your installation.</div>
            </div>
          )}
        </div>
      );
    }

    function SavedScreen({ bases, saved, onToggleSave, onOpen }) {
      const list = (bases || []).filter((b) => saved.includes(b.slug));
      if (!list.length) return <div className="content"><h2 className="screen-h">Saved</h2><div className="center">No saved bases yet.<br />Tap the bookmark on a base to save it here.</div></div>;
      return (
        <div className="content">
          <h2 className="screen-h">Saved</h2>
          {list.map((b) => (
            <div key={b.slug} className={"card" + (b.ready ? " tap" : "")} onClick={() => b.ready && onOpen(b.slug)} style={{ borderLeft: "4px solid " + branchColor(b.branch) }}>
              <div className="between">
                <div style={{ minWidth: 0 }}>
                  <div className="base-name">{b.name}{b.ready ? <span className="pill ready">Guide ready</span> : <span className="pill soon">Coming soon</span>}</div>
                  <div className="meta-line">{[b.branch, b.state].filter(Boolean).join("  -  ")}</div>
                </div>
                <div className="card-actions">
                  <button className="iconbtn" style={{ color: "var(--accent)" }} onClick={(e) => { e.stopPropagation(); onToggleSave(b.slug); }} aria-label="Remove"><Icon name="bookmarkOn" size={18} /></button>
                  {b.ready ? <span className="card-go"><Icon name="cardchev" size={20} /></span> : null}
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // Map (Leaflet + free OpenStreetMap tiles): base + live nearby places + drive time.
    function MapScreen({ slug, bases, onOpen }) {
      const elRef = useRef(null);
      const [data, setData] = useState(null);
      const [places, setPlaces] = useState([]);
      const [drive, setDrive] = useState(null);
      const [geoBusy, setGeoBusy] = useState(false);

      useEffect(() => {
        setData(null); setPlaces([]); setDrive(null);
        if (!slug) return;
        let live = true;
        fetchJSON(baseUrl(slug)).then((d) => { if (live) setData(d); }).catch(() => {});
        return () => { live = false; };
      }, [slug]);

      useEffect(() => {
        const c = data && data.coords; if (!c) return;
        let live = true;
        fetchJSON(apiUrl("/api/places/nearby?lat=" + c.lat + "&lng=" + c.lng + "&type=restaurant&radius=5000"))
          .then((d) => { if (live) setPlaces(d.results || []); }).catch(() => {});
        return () => { live = false; };
      }, [data]);

      useEffect(() => {
        const c = data && data.coords;
        if (!c || !elRef.current || !window.L) return;
        const map = L.map(elRef.current, { scrollWheelZoom: false }).setView([c.lat, c.lng], 12);
        L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "(c) OpenStreetMap", maxZoom: 19 }).addTo(map);
        L.circleMarker([c.lat, c.lng], { radius: 9, color: "#e7b24c", fillColor: "#e7b24c", fillOpacity: 0.9, weight: 2 }).addTo(map).bindPopup("<b>" + (data.name || "") + "</b>");
        places.forEach((p) => { if (p.location) L.circleMarker([p.location.latitude, p.location.longitude], { radius: 5, color: "#8aa0bf", fillColor: "#8aa0bf", fillOpacity: 0.85, weight: 1 }).addTo(map).bindPopup((p.name || "") + (p.rating ? " - " + p.rating : "")); });
        setTimeout(() => map.invalidateSize(), 120);
        return () => map.remove();
      }, [data, places]);

      const driveFromMe = () => {
        const c = data && data.coords; if (!c || !navigator.geolocation) return;
        setGeoBusy(true);
        navigator.geolocation.getCurrentPosition((pos) => {
          fetchJSON(apiUrl("/api/directions?from_lat=" + pos.coords.latitude + "&from_lng=" + pos.coords.longitude + "&to_lat=" + c.lat + "&to_lng=" + c.lng))
            .then((d) => { setGeoBusy(false); setDrive(d); })
            .catch(() => { setGeoBusy(false); setDrive({ error: true }); });
        }, () => setGeoBusy(false), { timeout: 10000 });
      };

      if (!slug) {
        const ready = (bases || []).filter((b) => b.ready);
        return (
          <div className="content"><h2 className="screen-h">Map</h2>
            <div className="center">Open a base to see its map and nearby places.
              {ready.length ? <div style={{ marginTop: 14, display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center" }}>{ready.map((b) => <button key={b.slug} className="btn-gold" onClick={() => onOpen(b.slug)}>{b.name}</button>)}</div> : null}
            </div>
          </div>
        );
      }
      return (
        <div className="content">
          <h2 className="screen-h">{data ? data.name : "Map"}</h2>
          <div ref={elRef} className="leaflet-wrap" />
          <div className="between" style={{ marginTop: 10 }}>
            <span className="faint tiny">{places.length ? places.length + " places nearby" : "Loading map..."}</span>
            <button className="btn-quiet" onClick={driveFromMe} disabled={geoBusy}>{geoBusy ? "Locating..." : "Drive time from me"}</button>
          </div>
          {drive ? (drive.error ? <div className="muted tiny" style={{ marginTop: 6 }}>Couldn't get drive time.</div> : <div className="muted small" style={{ marginTop: 6 }}>About {drive.duration_min} min ({drive.distance_mi} mi) from your location to {data.name}.</div>) : null}
        </div>
      );
    }

    /* ---------------- App shell ---------------- */
    function App() {
      const [tab, setTab] = useState("home");
      const [bases, setBases] = useState(null);
      const [loading, setLoading] = useState(true);
      const [slug, setSlug] = useState(null);
      const [saved, setSaved] = useState(() => LS.get("bg_saved", []));

      useEffect(() => {
        fetchJSON(indexUrl())
          .then((d) => setBases(d.bases || []))
          .catch(() => setBases([]))
          .finally(() => setLoading(false));
      }, []);

      const open = useCallback((s) => { setSlug(s); setTab("guide"); }, []);
      const back = useCallback(() => { setSlug(null); setTab("home"); }, []);
      const toggleSave = useCallback((s) => setSaved((prev) => {
        const n = prev.includes(s) ? prev.filter((x) => x !== s) : [...prev, s];
        LS.set("bg_saved", n); return n;
      }), []);

      let body;
      if (tab === "home") body = <Home bases={bases} loading={loading} onOpen={open} saved={saved} onToggleSave={toggleSave} />;
      else if (tab === "guide") body = slug
        ? <BaseDetail slug={slug} onBack={back} saved={saved} onToggleSave={toggleSave} />
        : <Stub label="Guide" note="Pick a base from Home to open its guide." />;
      else if (tab === "map") body = <MapScreen slug={slug} bases={bases} onOpen={open} />;
      else if (tab === "plan") body = <PlanScreen bases={bases} onOpen={open} />;
      else body = <SavedScreen bases={bases} saved={saved} onToggleSave={toggleSave} onOpen={open} />;

      const NavBtn = ({ id, icon, label }) => (
        <button className={tab === id ? "on" : ""} onClick={() => setTab(id)}>
          <span className="ic"><Icon name={icon} size={21} /></span>{label}
        </button>
      );

      return (
        <div id="app-shell">
          <div className="topbar">
            <h1>{APP_NAME}</h1>
            <div className="sub">{BRAND}</div>
          </div>
          <UpdateBanner />
          {body}
          <div className="nav">
            <NavBtn id="home" icon="home" label="HOME" />
            <NavBtn id="guide" icon="guide" label="GUIDE" />
            <NavBtn id="map" icon="map" label="MAP" />
            <NavBtn id="plan" icon="calendar" label="PLAN" />
            <NavBtn id="saved" icon="bookmark" label="SAVED" />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
